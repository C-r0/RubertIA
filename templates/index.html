<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: #e0e0e0; }
        
        .sidebar { width: 250px; background: #0f0f0f; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { color: #00ffcc; font-size: 1.5rem; margin-bottom: 30px; }
        .sidebar button { background: none; border: none; color: #bbb; padding: 15px; text-align: left; font-size: 1rem; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .sidebar button:hover { background: #222; color: #fff; }
        .sidebar button.active { background: #00ffcc22; color: #00ffcc; border-left: 4px solid #00ffcc; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; } 
        .tab-content.active { display: block; } 

        .noticia-card { background: #252525; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #00ffcc; }
        img { border-radius: 5px; margin: 10px 0; }

        .grid-atalhos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card-atalho {
            background: #252525;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
            color: #00ffcc;
            border: 1px solid #333;
            transition: 0.3s;
        }
        
        .card-atalho:hover {
            background: #00ffcc22;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="sidebar">
    	<div id="relogio" style="font-size: 1.8rem; color: #00ffcc; font-family: monospace; margin-bottom: 10px; font-weight: bold; text-align: center;">
    		00:00:00
    	</div>
        <h2>Dashboard</h2>
        <button onclick="openTab(event, 'chat')">🤖 IA Chat</button>
        <button onclick="openTab(event, 'noticias')" id="btn-noticias">📰 Notícias</button>
        <button onclick="openTab(event, 'busca')">🔍 SearXNG</button>
        <button onclick="openTab(event, 'atalhos')" class="active">🔗 Atalhos</button>
    </div>

    <div class="main-content">
        <div id="chat" class="tab-content">
            <h1>Rubert IA</h1>
            <p>Em breve: Análise de imagens de xadrez e geração de código.</p>
        </div>

        <div id="noticias" class="tab-content">
            <h1>Últimas Notícias</h1>
            <button onclick="carregarNoticias()">Atualizar Feed</button>
            <div id="container-noticias" style="margin-top: 20px;"></div>
        </div>

        <div id="busca" class="tab-content">
            <h1>Busca SearXNG</h1>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="input-busca" placeholder="O que você quer encontrar?" 
                       style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white;">
                <button onclick="executarBusca()" style="padding: 10px 20px; background: #00ffcc; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    🔍
                </button>
            </div>
            <div id="resultados-busca" style="margin-top: 20px;"></div>
        </div>
		<div id="atalhos" class="tab-content active">
		    <h1>Atalhos</h1>
		    <div class="grid-atalhos">
		        <a href="https://tiktok.com" target="_blank" class="card-atalho">Tiktok</a>
		        <a href="https://lichess.org" target="_blank" class="card-atalho">Lichess</a>
		        <a href="https://chess.com" target="_blank" class="card-atalho">Chess</a>
		        <a href="https://instagram.com" target="_blank" class="card-atalho">Instagram</a>
		        <a href="https://github.com" target="_blank" class="card-atalho">Github</a>
		        <a href="https://mail.google.com" target="_blank" class="card-atalho">Gmail</a>
		    </div>
		</div>
    </div>

<script>
	function atualizarRelogio() {
	    const agora = new Date();

	    const offsetBrasilia = -3; 
	    const horaBrasilia = new Date(agora.getTime() + (offsetBrasilia * 3600000) + (agora.getTimezoneOffset() * 60000));
	    
	    const horas = String(horaBrasilia.getHours()).padStart(2, '0');
	    const minutos = String(horaBrasilia.getMinutes()).padStart(2, '0');
	    const segundos = String(horaBrasilia.getSeconds()).padStart(2, '0');

	    const dia = String(horaBrasilia.getDate()).padStart(2, '0');
	    const mes = String(horaBrasilia.getMonth() + 1).padStart(2, '0'); 
	
	    const strHora = `${horas}:${minutos}:${segundos}`;
	    const strData = `${dia}/${mes}/${agora.getFullYear()}`;

	    document.getElementById('relogio').innerHTML = `${strHora}<br><span style="font-size: 0.8rem; color: #555;">${strData}</span>`;
	}

	setInterval(atualizarRelogio, 1000);
	atualizarRelogio();

    function openTab(evt, tabName) {
        let content = document.getElementsByClassName("tab-content");
        for (let i = 0; i < content.length; i++) {
            content[i].classList.remove("active");
        }

        let buttons = document.querySelectorAll(".sidebar button");
        buttons.forEach(btn => btn.classList.remove("active"));

        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    async function carregarNoticias() {
        const container = document.getElementById('container-noticias');
        container.innerHTML = "<p>Buscando no RSS...</p>";

        try {
            const response = await fetch('/api/noticias');
            const dados = await response.json();

            container.innerHTML = "";
            dados.forEach(noticia => {
                container.innerHTML += `
                    <div class="noticia-card">
                        <h3>${noticia.title}</h3>
                        ${noticia.image ? `<img src="${noticia.image}" width="300">` : ''}
                        <br><a href="${noticia.link}" target="_blank" style="color:#00ffcc">Ler mais</a>
                    </div>
                `;
            });
        } catch (err) {
            container.innerHTML = "<p>Erro ao carregar notícias.</p>";
        }
    }

    async function executarBusca() {
        const query = document.getElementById('input-busca').value;
        const container = document.getElementById('resultados-busca');
        
        if (!query) return;

        container.innerHTML = "<p>Buscando no SearXNG...</p>";

        try {
            const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const dados = await response.json();

            container.innerHTML = ""; 

            if (!dados || dados.length == 0) {
                container.innerHTML = "<p>Nenhum resultado encontrado.</p>";
                return;
            }

            dados.forEach(res => { 
                container.innerHTML += `
                    <div class="noticia-card" style="border-left-color: #7000ff;">
                    	<p>
                    		<small>
                    			${res.url}
                    		</small>
                    	</p>
                        <a href="${res.url}" target="_blank" style="color: #00ffcc; font-size: 1.2rem; text-decoration: none;">
                            ${res.title}
                        </a>
                        <p style="font-size: 0.9rem; color: #aaa; margin: 5px 0;">${res.content || 'Sem descrição.'}</p>
                        <small style="color: #555;">Fonte: ${res.engine}</small>
                    </div>
                `;
            });
        } catch (err) {
            container.innerHTML = "<p>Erro ao se conectar ao SearXNG</p>";
            console.error(err);
        }
    }

    document.getElementById('input-busca').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            executarBusca();
        }
    });
</script>
</body>
</html>
